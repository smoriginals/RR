<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Richer</title>
  <link rel="shortcut icon" href="assets/new/images/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    .signup-container {
      background: linear-gradient(135deg, var(--light-bg) 0%, var(--light-bg-2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 10px;
      width: 100%;
    }

    .signup-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
      width: 100%;
      max-width: 420px;
      padding: 22px 26px;
      animation: slideInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid rgba(123, 47, 247, 0.08);
      transition: box-shadow 0.4s ease;
    }

    .signup-card:hover {
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .signup-header {
      text-align: center;
      margin-bottom: 14px;
    }

    .signup-header img {
      max-height: 28px;
      margin-bottom: 6px;
    }

    .signup-header h1 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 2px;
      color: var(--text-dark);
      letter-spacing: -0.5px;
    }

    .signup-header p {
      color: var(--text-light);
      font-size: 12px;
      font-weight: 500;
    }

    .signup-form {
      margin-bottom: 0;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 8px;
    }

    .form-group label {
      display: block;
      margin-bottom: 3px;
      font-weight: 600;
      color: var(--text-dark);
      font-size: 12px;
      letter-spacing: 0.2px;
    }

    .form-group input {
      width: 100%;
      padding: 8px 10px;
      border: 2px solid var(--border-color);
      border-radius: 7px;
      font-size: 14px;
      transition: all 0.3s ease;
      background: var(--light-bg);
      font-family: inherit;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-color);
      background: white;
      box-shadow: 0 0 0 3px rgba(123, 47, 247, 0.1);
    }

    .form-group input::placeholder {
      color: var(--text-light);
      font-weight: 500;
    }

    .password-strength {
      margin-top: 3px;
      font-size: 11px;
      font-weight: 700;
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.05);
    }

    .password-strength.weak { color: #dc3545; background: rgba(220, 53, 69, 0.1); }
    .password-strength.fair { color: #ffc107; background: rgba(255, 193, 7, 0.1); }
    .password-strength.good { color: #28a745; background: rgba(40, 167, 69, 0.1); }

    .terms-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .terms-checkbox input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--primary-color);
      flex-shrink: 0;
    }

    .terms-checkbox label {
      margin: 0;
      color: var(--text-dark);
      cursor: pointer;
      font-weight: 500;
    }

    .terms-checkbox a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
    }

    .signup-btn {
      width: 100%;
      padding: 9px 18px;
      background: linear-gradient(135deg, #7B2FF7 0%, #FF3C8E 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.35s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(123, 47, 247, 0.35);
    }

    .signup-btn:hover {
      background: linear-gradient(135deg, #5A1AD4 0%, #d4327a 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(123, 47, 247, 0.5);
    }

    .signup-btn i {
      font-size: 14px;
    }

    .divider {
      position: relative;
      margin: 10px 0;
      text-align: center;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border-color);
    }

    .divider span {
      position: relative;
      background: white;
      padding: 0 12px;
      color: var(--text-light);
      font-size: 11px;
      font-weight: 600;
    }

    .social-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .social-btn {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #7B2FF7 0%, #FF3C8E 100%);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.35s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      box-shadow: 0 4px 15px rgba(123, 47, 247, 0.35);
    }

    .social-btn:hover {
      background: linear-gradient(135deg, #5A1AD4 0%, #d4327a 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(123, 47, 247, 0.5);
    }

    .signup-footer {
      text-align: center;
      border-top: 1px solid var(--border-color);
      padding-top: 10px;
    }

    .signup-footer p {
      color: var(--text-light);
      margin-bottom: 3px;
      font-size: 12px;
      font-weight: 500;
    }

    .signup-footer a {
      color: var(--primary-color);
      font-weight: 700;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .signup-footer a:hover {
      color: var(--primary-dark);
    }

    /* Desktop (1025px+) */
    @media (min-width: 1025px) {
      .signup-card { max-width: 440px; padding: 26px 32px; }
      .signup-header h1 { font-size: 22px; }
      .form-group input { padding: 9px 12px; }
      .signup-btn { padding: 10px 20px; font-size: 15px; }
    }

    /* Tablet (768px - 1024px) */
    @media (max-width: 1024px) {
      .signup-card { max-width: 420px; padding: 22px 26px; }
      .signup-header h1 { font-size: 20px; }
    }

    /* Mobile Large (481px - 768px) */
    @media (max-width: 768px) {
      .signup-container { padding: 8px; }
      .signup-card {
        max-width: 100%;
        padding: 18px 18px;
        border-radius: 14px;
      }
      .signup-header { margin-bottom: 10px; }
      .signup-header h1 { font-size: 18px; }
      .signup-header p { font-size: 11px; }
      .form-group { margin-bottom: 7px; }
      .form-group label { font-size: 11px; margin-bottom: 2px; }
      .form-group input { padding: 8px 10px; font-size: 14px; }
      .form-row { gap: 8px; }
      .terms-checkbox { margin-bottom: 8px; font-size: 11px; }
      .signup-btn { padding: 8px 16px; font-size: 13px; }
      .divider { margin: 8px 0; }
      .social-buttons { gap: 6px; margin-bottom: 10px; }
      .social-btn { padding: 7px 10px; font-size: 11px; }
      .signup-footer { padding-top: 8px; }
    }

    /* Mobile Small (320px - 480px) */
    @media (max-width: 480px) {
      .signup-container { padding: 6px; }
      .signup-card { padding: 14px 14px; border-radius: 12px; }
      .signup-header { margin-bottom: 8px; }
      .signup-header img { max-height: 24px; margin-bottom: 4px; }
      .signup-header h1 { font-size: 16px; }
      .signup-header p { font-size: 10px; }
      .form-group { margin-bottom: 5px; }
      .form-group label { font-size: 11px; margin-bottom: 2px; }
      .form-group input { padding: 7px 9px; font-size: 13px; border-radius: 6px; }
      .form-row { gap: 6px; }
      .password-strength { font-size: 10px; padding: 2px 6px; }
      .terms-checkbox { margin-bottom: 7px; font-size: 10px; gap: 6px; }
      .terms-checkbox input[type="checkbox"] { width: 14px; height: 14px; }
      .signup-btn { padding: 7px 14px; font-size: 12px; }
      .signup-btn i { font-size: 12px; }
      .divider { margin: 6px 0; }
      .divider span { font-size: 10px; }
      .social-buttons { gap: 5px; margin-bottom: 8px; }
      .social-btn { padding: 6px 8px; font-size: 10px; border-radius: 6px; }
      .signup-footer { padding-top: 7px; }
      .signup-footer p { font-size: 10px; margin-bottom: 2px; }
    }

    /* Extra Small (Below 320px) */
    @media (max-width: 319px) {
      .signup-card { padding: 12px 10px; }
      .signup-header h1 { font-size: 15px; }
      .form-group input { padding: 6px 8px; font-size: 12px; }
      .signup-btn { padding: 6px 12px; font-size: 11px; }
      .social-btn { font-size: 9px; padding: 5px 6px; }
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="signup-card">
      <div class="signup-header">
        <img src="assets/new/images/logo.png" alt="Richer Logo">
        <h1>Join Richer</h1>
        <p>Start your learning journey today</p>
      </div>

      <form id="signup-form" class="signup-form">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe" autocomplete="name">
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com" autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="phone">Phone <span style="color: var(--text-light); font-weight: 400;">(Optional)</span></label>
          <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" autocomplete="tel">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Strong password" onchange="checkPasswordStrength(this.value)" autocomplete="new-password">
            <div class="password-strength"></div>
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm password" autocomplete="new-password">
          </div>
        </div>

        <div class="terms-checkbox">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">I agree to the <a href="terms.html">Terms & Conditions</a></label>
        </div>

        <!-- Referral Code (Auto-filled from URL or manual entry) -->
        <div class="form-group" style="margin-bottom: 10px;">
          <label for="referral-code">Referral Code <span style="color: var(--text-light); font-weight: 400;">(Optional)</span></label>
          <input type="text" id="referral-code" name="referral_code" placeholder="Enter referral code" autocomplete="off" style="border-color: rgba(123, 47, 247, 0.2); background: rgba(123, 47, 247, 0.03);">
        </div>

        <button type="submit" class="signup-btn">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="social-buttons">
        <button type="button" class="social-btn">
          <i class="fab fa-google"></i> Google
        </button>
        <button type="button" class="social-btn">
          <i class="fab fa-facebook-f"></i> Facebook
        </button>
      </div>

      <div class="signup-footer">
        <p>Already have an account? <a href="signin.html">Sign In</a></p>
        <p style="font-size: 10px; margin-top: 4px; color: var(--text-light);">
          We'll send you a verification email after signup
        </p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    // Auto-fill referral code from URL
    (function() {
      var params = new URLSearchParams(window.location.search);
      var ref = params.get('ref');
      if (ref && /^[a-zA-Z0-9_-]+$/.test(ref)) {
        var refInput = document.getElementById('referral-code');
        if (refInput) {
          refInput.value = ref;
          refInput.setAttribute('readonly', true);
          refInput.style.background = 'rgba(40, 167, 69, 0.05)';
          refInput.style.borderColor = 'rgba(40, 167, 69, 0.3)';
        }
      }
      // Also check localStorage for stored referral
      try {
        var stored = JSON.parse(localStorage.getItem('em_referral'));
        if (stored && stored.code && stored.expires > Date.now() && !ref) {
          var refInput = document.getElementById('referral-code');
          if (refInput && !refInput.value) {
            refInput.value = stored.code;
          }
        }
      } catch(e) {}
    })();

    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var name = document.getElementById('name').value;
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var confirm = document.getElementById('confirm-password').value;
      var terms = document.getElementById('terms').checked;
      var referralCode = document.getElementById('referral-code').value;
      if (name && email && password && confirm && terms) {
        if (password !== confirm) {
          alert('Passwords do not match!');
          return;
        }
        // Store referral code for backend processing
        if (referralCode) {
          localStorage.setItem('em_signup_referral', referralCode);
        }
        var btn = document.querySelector('.signup-btn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
        btn.style.pointerEvents = 'none';
        btn.style.opacity = '0.8';
        setTimeout(function() {
          window.location.href = 'dashboard.html';
        }, 800);
      }
    });
  </script>
</body>
</html>
