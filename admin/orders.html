<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="../assets/new/images/logo.png" alt="Richer" class="sidebar-logo">
      <span class="sidebar-brand">Admin</span>
      <button class="sidebar-close" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="courses.html" class="nav-link"><i class="fas fa-graduation-cap"></i> Courses</a>
      <a href="users.html" class="nav-link"><i class="fas fa-users"></i> Users</a>
      <a href="orders.html" class="nav-link active"><i class="fas fa-shopping-bag"></i> Orders</a>
      <a href="coupons.html" class="nav-link"><i class="fas fa-tags"></i> Coupons</a>
      <a href="blog-manage.html" class="nav-link"><i class="fas fa-blog"></i> Blog Posts</a>
      <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <a href="../index.html" class="nav-link"><i class="fas fa-external-link-alt"></i> View Website</a>
      <a href="#" class="nav-link logout" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </aside>

  <div class="main-content" id="mainContent">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h2 class="page-title">Orders</h2>
      </div>
      <div class="topbar-right"></div>
    </header>

    <div class="content">
      <div class="toolbar">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="orderSearch" placeholder="Search orders..." oninput="filterOrders()">
        </div>
        <select id="orderFilter" onchange="filterOrders()">
          <option value="all">All Status</option>
          <option value="completed">Completed</option>
          <option value="pending">Pending</option>
          <option value="refunded">Refunded</option>
        </select>
      </div>

      <div class="panel">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Course</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ordersTableBody">
              <tr>
                <td colspan="7" class="empty-state">
                  <i class="fas fa-receipt"></i>
                  <p>No orders found</p>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    requireAdmin();
    loadOrdersList();
  </script>
</body>
</html>
