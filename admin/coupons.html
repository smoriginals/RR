<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coupons - Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="../assets/new/images/logo.png" alt="Richer" class="sidebar-logo">
      <span class="sidebar-brand">Admin</span>
      <button class="sidebar-close" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="courses.html" class="nav-link"><i class="fas fa-graduation-cap"></i> Courses</a>
      <a href="users.html" class="nav-link"><i class="fas fa-users"></i> Users</a>
      <a href="orders.html" class="nav-link"><i class="fas fa-shopping-bag"></i> Orders</a>
      <a href="coupons.html" class="nav-link active"><i class="fas fa-tags"></i> Coupons</a>
      <a href="blog-manage.html" class="nav-link"><i class="fas fa-blog"></i> Blog Posts</a>
      <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <a href="../index.html" class="nav-link"><i class="fas fa-external-link-alt"></i> View Website</a>
      <a href="#" class="nav-link logout" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </aside>

  <div class="main-content" id="mainContent">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h2 class="page-title">Coupons</h2>
      </div>
      <div class="topbar-right">
        <button class="btn-primary" onclick="showCouponForm()">
          <i class="fas fa-plus"></i> Create Coupon
        </button>
      </div>
    </header>

    <div class="content">
      <div class="panel" id="couponFormPanel" style="display: none;">
        <div class="panel-header">
          <h3 id="couponFormTitle"><i class="fas fa-tag"></i> Create Coupon</h3>
          <button class="btn-ghost" onclick="hideCouponForm()"><i class="fas fa-times"></i></button>
        </div>
        <div class="panel-body">
          <form id="couponForm" onsubmit="saveCoupon(event)">
            <input type="hidden" id="couponId">
            <div class="form-row">
              <div class="form-group">
                <label>Coupon Code *</label>
                <input type="text" id="couponCode" placeholder="e.g. SAVE20" required style="text-transform: uppercase;">
              </div>
              <div class="form-group">
                <label>Discount Type *</label>
                <select id="couponType" required>
                  <option value="percentage">Percentage (%)</option>
                  <option value="fixed">Fixed Amount (₹)</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Discount Value *</label>
                <input type="number" id="couponValue" placeholder="e.g. 20" min="1" required>
              </div>
              <div class="form-group">
                <label>Max Uses</label>
                <input type="number" id="couponMaxUses" placeholder="Unlimited" min="1">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Expiry Date</label>
                <input type="date" id="couponExpiry">
              </div>
              <div class="form-group">
                <label>Status</label>
                <select id="couponStatus">
                  <option value="active">Active</option>
                  <option value="inactive">Inactive</option>
                </select>
              </div>
            </div>
            <div class="form-actions">
              <button type="button" class="btn-ghost" onclick="hideCouponForm()">Cancel</button>
              <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Coupon</button>
            </div>
          </form>
        </div>
      </div>

      <div class="panel">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
              <tr>
                <th>Code</th>
                <th>Type</th>
                <th>Discount</th>
                <th>Uses</th>
                <th>Expiry</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="couponsTableBody">
              <tr>
                <td colspan="7" class="empty-state">
                  <i class="fas fa-tags"></i>
                  <p>No coupons found</p>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    requireAdmin();
    loadCouponsList();
  </script>
</body>
</html>
