<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="../assets/new/images/logo.png" alt="Richer" class="sidebar-logo">
      <span class="sidebar-brand">Admin</span>
      <button class="sidebar-close" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="courses.html" class="nav-link active"><i class="fas fa-graduation-cap"></i> Courses</a>
      <a href="users.html" class="nav-link"><i class="fas fa-users"></i> Users</a>
      <a href="orders.html" class="nav-link"><i class="fas fa-shopping-bag"></i> Orders</a>
      <a href="coupons.html" class="nav-link"><i class="fas fa-tags"></i> Coupons</a>
      <a href="blog-manage.html" class="nav-link"><i class="fas fa-blog"></i> Blog Posts</a>
      <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <a href="../index.html" class="nav-link"><i class="fas fa-external-link-alt"></i> View Website</a>
      <a href="#" class="nav-link logout" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h2 class="page-title">Courses</h2>
      </div>
      <div class="topbar-right">
        <button class="btn-primary" onclick="showCourseForm()">
          <i class="fas fa-plus"></i> Add Course
        </button>
      </div>
    </header>

    <div class="content">
      <!-- Course Form (hidden by default) -->
      <div class="panel course-form-panel" id="courseFormPanel" style="display: none;">
        <div class="panel-header">
          <h3 id="courseFormTitle"><i class="fas fa-plus-circle"></i> Add New Course</h3>
          <button class="btn-ghost" onclick="hideCourseForm()"><i class="fas fa-times"></i></button>
        </div>
        <div class="panel-body">
          <form id="courseForm" onsubmit="saveCourse(event)">
            <input type="hidden" id="courseId">
            <div class="form-row">
              <div class="form-group">
                <label>Course Title *</label>
                <input type="text" id="courseTitle" placeholder="e.g. Complete Digital Marketing Mastery" required>
              </div>
              <div class="form-group">
                <label>Category *</label>
                <select id="courseCategory" required>
                  <option value="">Select Category</option>
                  <option value="digital">Digital Marketing</option>
                  <option value="branding">Personal Branding</option>
                  <option value="affiliate">Affiliate Marketing</option>
                  <option value="ecommerce">E-Commerce</option>
                  <option value="finance">Finance & Trading</option>
                  <option value="development">Web Development</option>
                  <option value="design">Design</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Description *</label>
              <textarea id="courseDescription" rows="4" placeholder="Write a brief course description..." required></textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Instructor Name *</label>
                <input type="text" id="courseInstructor" placeholder="e.g. John Smith" required>
              </div>
              <div class="form-group">
                <label>Total Lessons</label>
                <input type="number" id="courseLessons" placeholder="e.g. 32" min="1">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Price (₹) *</label>
                <input type="number" id="coursePrice" placeholder="e.g. 299" min="0" required>
              </div>
              <div class="form-group">
                <label>Original Price (₹)</label>
                <input type="number" id="courseOriginalPrice" placeholder="e.g. 999" min="0">
              </div>
              <div class="form-group">
                <label>Rating</label>
                <input type="number" id="courseRating" placeholder="e.g. 4.8" min="0" max="5" step="0.1">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Image URL</label>
                <input type="url" id="courseImage" placeholder="https://picsum.photos/600/400">
              </div>
              <div class="form-group">
                <label>Badge</label>
                <select id="courseBadge">
                  <option value="">No Badge</option>
                  <option value="Starter">Starter</option>
                  <option value="Popular">Popular</option>
                  <option value="Premium">Premium</option>
                  <option value="New">New</option>
                  <option value="Bestseller">Bestseller</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Status</label>
                <select id="courseStatus">
                  <option value="published">Published</option>
                  <option value="draft">Draft</option>
                </select>
              </div>
              <div class="form-group">
                <label>Duration</label>
                <input type="text" id="courseDuration" placeholder="e.g. 12 hours">
              </div>
            </div>

            <div class="form-actions">
              <button type="button" class="btn-ghost" onclick="hideCourseForm()">Cancel</button>
              <button type="submit" class="btn-primary" id="courseSubmitBtn">
                <i class="fas fa-save"></i> Save Course
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Search & Filter -->
      <div class="toolbar">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="courseSearch" placeholder="Search courses..." oninput="filterCourses()">
        </div>
        <select id="courseFilter" onchange="filterCourses()">
          <option value="all">All Categories</option>
          <option value="digital">Digital Marketing</option>
          <option value="branding">Personal Branding</option>
          <option value="affiliate">Affiliate Marketing</option>
          <option value="ecommerce">E-Commerce</option>
          <option value="finance">Finance & Trading</option>
          <option value="development">Web Development</option>
          <option value="design">Design</option>
          <option value="other">Other</option>
        </select>
      </div>

      <!-- Courses Table -->
      <div class="panel">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
              <tr>
                <th>Course</th>
                <th>Category</th>
                <th>Instructor</th>
                <th>Price</th>
                <th>Rating</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="coursesTableBody">
              <tr>
                <td colspan="7" class="empty-state">
                  <i class="fas fa-book-open"></i>
                  <p>No courses found. Click "Add Course" to create one.</p>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    requireAdmin();
    loadCoursesList();
    // Auto-open form if ?action=add
    if (new URLSearchParams(window.location.search).get('action') === 'add') {
      showCourseForm();
    }
  </script>
</body>
</html>
