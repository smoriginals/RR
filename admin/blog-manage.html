<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Management - Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="../assets/new/images/logo.png" alt="Richer" class="sidebar-logo">
      <span class="sidebar-brand">Admin</span>
      <button class="sidebar-close" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="courses.html" class="nav-link"><i class="fas fa-graduation-cap"></i> Courses</a>
      <a href="users.html" class="nav-link"><i class="fas fa-users"></i> Users</a>
      <a href="orders.html" class="nav-link"><i class="fas fa-shopping-bag"></i> Orders</a>
      <a href="coupons.html" class="nav-link"><i class="fas fa-tags"></i> Coupons</a>
      <a href="blog-manage.html" class="nav-link active"><i class="fas fa-blog"></i> Blog Posts</a>
      <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <a href="../index.html" class="nav-link"><i class="fas fa-external-link-alt"></i> View Website</a>
      <a href="#" class="nav-link logout" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </aside>

  <div class="main-content" id="mainContent">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h2 class="page-title">Blog Posts</h2>
      </div>
      <div class="topbar-right">
        <button class="btn-primary" onclick="showBlogForm()">
          <i class="fas fa-plus"></i> New Post
        </button>
      </div>
    </header>

    <div class="content">
      <div class="panel" id="blogFormPanel" style="display: none;">
        <div class="panel-header">
          <h3 id="blogFormTitle"><i class="fas fa-edit"></i> New Blog Post</h3>
          <button class="btn-ghost" onclick="hideBlogForm()"><i class="fas fa-times"></i></button>
        </div>
        <div class="panel-body">
          <form id="blogForm" onsubmit="saveBlogPost(event)">
            <input type="hidden" id="blogId">
            <div class="form-group">
              <label>Title *</label>
              <input type="text" id="blogTitle" placeholder="Blog post title" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Author *</label>
                <input type="text" id="blogAuthor" placeholder="Author name" required>
              </div>
              <div class="form-group">
                <label>Category</label>
                <select id="blogCategory">
                  <option value="marketing">Marketing</option>
                  <option value="branding">Branding</option>
                  <option value="technology">Technology</option>
                  <option value="finance">Finance</option>
                  <option value="lifestyle">Lifestyle</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Excerpt</label>
              <textarea id="blogExcerpt" rows="2" placeholder="Short summary..."></textarea>
            </div>
            <div class="form-group">
              <label>Content *</label>
              <textarea id="blogContent" rows="8" placeholder="Write your blog post content here..." required></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Featured Image URL</label>
                <input type="url" id="blogImage" placeholder="https://picsum.photos/800/400">
              </div>
              <div class="form-group">
                <label>Status</label>
                <select id="blogStatus">
                  <option value="published">Published</option>
                  <option value="draft">Draft</option>
                </select>
              </div>
            </div>
            <div class="form-actions">
              <button type="button" class="btn-ghost" onclick="hideBlogForm()">Cancel</button>
              <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Post</button>
            </div>
          </form>
        </div>
      </div>

      <div class="toolbar">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="blogSearch" placeholder="Search posts..." oninput="filterBlogPosts()">
        </div>
      </div>

      <div class="panel">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="blogTableBody">
              <tr>
                <td colspan="6" class="empty-state">
                  <i class="fas fa-blog"></i>
                  <p>No blog posts found</p>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    requireAdmin();
    loadBlogList();
  </script>
</body>
</html>
