<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Richer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">
          <i class="fas fa-shield-alt"></i>
        </div>
        <h1>Admin Panel</h1>
        <p>Sign in to manage your platform</p>
      </div>

      <form class="login-form" id="adminLoginForm">
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
          <input type="email" id="email" placeholder="admin@richer.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-password" onclick="togglePassword()">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember"> Remember me
          </label>
        </div>

        <button type="submit" class="login-btn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>

        <div class="login-error" id="loginError" style="display: none;">
          <i class="fas fa-exclamation-circle"></i>
          <span id="errorText">Invalid credentials</span>
        </div>
      </form>

      <div class="login-footer">
        <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    // Redirect if already logged in
    if (getAdminSession()) {
      window.location.href = 'index.html';
    }

    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      const errorText = document.getElementById('errorText');

      if (adminLogin(email, password)) {
        window.location.href = 'index.html';
      } else {
        errorText.textContent = 'Invalid email or password';
        errorEl.style.display = 'flex';
        setTimeout(() => { errorEl.style.display = 'none'; }, 4000);
      }
    });

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.querySelector('.toggle-password i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>
</body>
</html>
